server:
  port: 8090

spring:
  application:
    name: api-gateway
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cloud:
    gateway:
      default-filters:
        - name: RequestRateLimiter
          args:
            key-resolver: "#{@ipKeyResolver}"
            redis-rate-limiter.replenishRate: 100
            redis-rate-limiter.burstCapacity: 6000
            redis-rate-limiter.requestedTokens: 60
      routes:
        - id: vehicle-service
          uri: lb://vehicle-microservice
          predicates:
            - Path=/api/vehicles,/api/vehicles/**
          filters:
            - RewritePath=/api/vehicles(?<segment>/?.*), /vehicles$\{segment}
        - id: driver-service
          uri: lb://driver-microservice
          predicates:
            - Path=/api/drivers,/api/drivers/**
          filters:
            - RewritePath=/api/drivers(?<segment>/?.*), /drivers$\{segment}
        - id: usage-service
          uri: lb://usage-microservice
          predicates:
            - Path=/api/usage,/api/usage/**
          filters:
            - RewritePath=/api/usage(?<segment>/?.*), $\{segment}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
