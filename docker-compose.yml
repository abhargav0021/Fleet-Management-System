services:

  # ── Infrastructure ────────────────────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    container_name: fleet-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - fleet-net

  rabbitmq:
    image: rabbitmq:3-management
    container_name: fleet-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - fleet-net

  redis:
    image: redis:7-alpine
    container_name: fleet-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - fleet-net

  # ── Service Registry ─────────────────────────────────────────────────────────

  service-registry:
    build:
      context: ./service-registry
      dockerfile: Dockerfile
    container_name: fleet-service-registry
    ports:
      - "8761:8761"
    environment:
      EUREKA_SERVER_URL: http://service-registry:8761/eureka/
    networks:
      - fleet-net

  # ── Microservices ─────────────────────────────────────────────────────────────

  vehicle-microservice:
    build:
      context: ./vehicle-microservice
      dockerfile: Dockerfile
    container_name: fleet-vehicle-service
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: fleet_vehicles
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-guest}
      EUREKA_SERVER_URL: http://service-registry:8761/eureka/
    depends_on:
      postgres:
        condition: service_healthy
      service-registry:
        condition: service_started
    networks:
      - fleet-net

  driver-microservice:
    build:
      context: ./driver-microservice
      dockerfile: Dockerfile
    container_name: fleet-driver-service
    ports:
      - "8081:8081"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: fleet_drivers
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-guest}
      EUREKA_SERVER_URL: http://service-registry:8761/eureka/
      VEHICLE_BASE_URL: http://vehicle-microservice:8080/
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      service-registry:
        condition: service_started
    networks:
      - fleet-net

  usage-microservice:
    build:
      context: ./usage-microservice
      dockerfile: Dockerfile
    container_name: fleet-usage-service
    ports:
      - "8082:8082"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: fleet_usage
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-guest}
      EUREKA_SERVER_URL: http://service-registry:8761/eureka/
      VEHICLE_BASE_URL: http://vehicle-microservice:8080/
      DRIVER_BASE_URL: http://driver-microservice:8081/
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      service-registry:
        condition: service_started
    networks:
      - fleet-net

  # ── API Gateway ───────────────────────────────────────────────────────────────

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: fleet-api-gateway
    ports:
      - "8090:8090"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      EUREKA_SERVER_URL: http://service-registry:8761/eureka/
    depends_on:
      redis:
        condition: service_started
      service-registry:
        condition: service_started
      vehicle-microservice:
        condition: service_started
      driver-microservice:
        condition: service_started
      usage-microservice:
        condition: service_started
    networks:
      - fleet-net

  # ── Frontend ──────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fleet-frontend
    ports:
      - "80:80"
    depends_on:
      api-gateway:
        condition: service_started
    networks:
      - fleet-net

# ── Shared resources ───────────────────────────────────────────────────────────

networks:
  fleet-net:
    driver: bridge

volumes:
  postgres_data:
  rabbitmq_data:
  redis_data:
